<!DOCTYPE html><html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CHATGURU</title><script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --primary: #ff2f87;
        --secondary: #d4af37;
        --gold-2: #f7d774;
        --bg: #f6edf4;
        --white: #ffffff;
        --text: #170f14;
        --text-light: #75606d;
        --border: #ead8e3;
        --online: #31a24c;
        --offline: #f1c40f;
        --admin: #c88f00;
        --vu: #34b7f1;
        --danger: #dc3545;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    html, body { height:100%; background:var(--bg); }
    body { display:flex; justify-content:center; align-items:center; }

    #app-container {
        width:100%;
        max-width:450px;
        height:100vh;
        background:var(--white);
        display:flex;
        flex-direction:column;
        overflow:hidden;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
        position:relative;
    }

    .hidden { display:none !important; }

    /* Auth */
    .auth-screen {
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        background:linear-gradient(135deg, #ff2f87, #d4af37);
        color:white;
        z-index:200;
    }

    .auth-brand {
        font-size:34px;
        font-weight:900;
        letter-spacing:2px;
        margin-bottom:12px;
    }

    .auth-sub {
        margin-bottom:18px;
        font-size:14px;
        text-align:center;
        max-width:320px;
        opacity:0.95;
    }

    .auth-form {
        background:white;
        padding:30px;
        border-radius:10px;
        width:90%;
        max-width:350px;
        box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .auth-form input {
        width:100%;
        padding:12px;
        margin-bottom:15px;
        border:1px solid var(--border);
        border-radius:5px;
        font-size:16px;
        outline:none;
    }

    .password-field { position:relative; }
    .password-field input { padding-right:40px; }
    .toggle-password {
        position:absolute;
        right:10px;
        top:50%;
        transform:translateY(-50%);
        cursor:pointer;
        color:#888;
    }

    .auth-form button {
        width:100%;
        padding:12px;
        background:linear-gradient(135deg, var(--primary), var(--secondary));
        color:white;
        border:none;
        border-radius:5px;
        font-size:16px;
        cursor:pointer;
        font-weight:bold;
    }

    .auth-toggle { margin-top:15px; color:var(--primary); cursor:pointer; text-align:center; font-size:14px; }
    .auth-error { color:red; margin-bottom:10px; text-align:center; }
    .forgot-password { text-align:right; font-size:14px; color:var(--primary); cursor:pointer; margin-bottom:15px; }

    /* Main app */
    .main-app { flex:1; display:none; flex-direction:column; height:100%; }
    .main-app.active { display:flex; }

    /* Header */
    .header {
        height:60px;
        background:linear-gradient(90deg, var(--primary), var(--secondary));
        color:white;
        display:flex;
        align-items:center;
        padding:0 10px;
        flex-shrink:0;
    }

    .header .menu-btn { font-size:22px; cursor:pointer; margin-right:15px; }
    .header .title { font-size:18px; font-weight:bold; flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .header .back-btn { font-size:20px; cursor:pointer; margin-right:15px; display:none; }
    .header .refresh-btn { font-size:18px; cursor:pointer; margin-left:10px; }

    .unread-badge {
        position:relative;
        display:inline-flex;
        align-items:center;
        margin-left:10px;
    }

    .unread-badge .fa-envelope { font-size:18px; }
    .unread-badge .count {
        position:absolute;
        top:-8px;
        right:-10px;
        background:var(--offline);
        color:black;
        border-radius:50%;
        width:20px;
        height:20px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:12px;
        font-weight:bold;
    }

    /* Sidebar */
    .sidebar-overlay {
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.5);
        z-index:10;
        display:none;
    }

    .sidebar {
        position:absolute;
        top:0;
        left:-280px;
        width:280px;
        height:100%;
        background:white;
        z-index:20;
        transition:0.3s;
        display:flex;
        flex-direction:column;
    }

    .sidebar.active { left:0; }

    .sidebar-header {
        height:100px;
        background:linear-gradient(135deg, var(--primary), var(--secondary));
        color:white;
        display:flex;
        align-items:center;
        padding:20px;
        font-size:18px;
        font-weight:bold;
    }

    .sidebar-menu { flex:1; padding-top:20px; }
    .sidebar-item { padding:15px 25px; cursor:pointer; font-size:16px; color:var(--text); display:flex; align-items:center; }
    .sidebar-item i { margin-right:15px; width:20px; text-align:center; }
    .sidebar-item:hover { background:var(--bg); }
    .sidebar-item.logout { margin-top:auto; color:red; }

    /* Content */
    .content-area { flex:1; overflow-y:auto; display:none; flex-direction:column; background:var(--bg); }
    .content-area.active { display:flex; }

    /* Messages */
    .message-list {
        flex:1;
        padding:15px;
        overflow-y:auto;
        display:flex;
        flex-direction:column;
    }

    .message-row {
        display:flex;
        align-items:flex-end;
        margin-bottom:10px;
        max-width:85%;
    }

    .message-row.me { align-self:flex-end; flex-direction:row-reverse; }
    .message-row.other { align-self:flex-start; }

    .avatar-small {
        width:32px;
        height:32px;
        border-radius:50%;
        margin:0 8px;
        flex-shrink:0;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:20px;
        background:#ddd;
        overflow:hidden;
    }

    .avatar-small img {
        width:100%;
        height:100%;
        border-radius:50%;
        object-fit:cover;
    }

    .message-content { max-width:70%; }

    .message-bubble {
        padding:8px 12px;
        border-radius:18px;
        font-size:15px;
        line-height:1.3;
        word-wrap:break-word;
        overflow:hidden;
    }

    .me .message-bubble {
        background:linear-gradient(135deg, var(--primary), var(--secondary));
        color:white;
        border-bottom-right-radius:4px;
    }

    .other .message-bubble {
        background:#e4e6eb;
        color:var(--text);
        border-bottom-left-radius:4px;
    }

    .reply-preview {
        background:rgba(255,255,255,0.3);
        border-left:3px solid rgba(255,255,255,0.6);
        padding:4px 8px;
        margin-bottom:4px;
        border-radius:6px;
        font-size:13px;
    }

    .other .reply-preview {
        background:rgba(0,0,0,0.1);
        border-left-color:rgba(0,0,0,0.3);
    }

    .message-info {
        font-size:11px;
        color:var(--text-light);
        margin-top:4px;
        display:flex;
        align-items:center;
        gap:5px;
        flex-wrap:wrap;
    }

    .me .message-info {
        justify-content:flex-end;
        flex-direction:row-reverse;
    }

    .admin-name { color:var(--admin); font-weight:bold; }
    .message-image { max-width:100%; border-radius:10px; margin:5px 0; cursor:pointer; }
    .reply-icon { font-size:12px; cursor:pointer; color:#888; margin-left:5px; }
    .reply-icon:hover { color:var(--primary); }
    .vu-badge { color:var(--vu); font-size:10px; margin-left:5px; font-weight:bold; }
    .clickable-name { cursor:pointer; color:var(--primary); text-decoration:underline; }

    /* Inline reply */
    .inline-reply-form {
        margin-top:5px;
        background:#f9f9f9;
        border-radius:10px;
        padding:10px;
        display:flex;
        flex-direction:column;
        gap:10px;
        width:100%;
    }

    .inline-reply-top {
        display:flex;
        flex-direction:column;
        gap:8px;
    }

    .reply-mention {
        font-size:13px;
        color:var(--primary);
        font-weight:bold;
    }

    .reply-input {
        width:100%;
        min-height:90px;
        resize:vertical;
        border:1px solid #ddd;
        border-radius:12px;
        padding:12px 15px;
        font-size:16px;
        line-height:1.4;
        outline:none;
        background:white;
        color:var(--text);
    }

    .inline-reply-actions {
        display:flex;
        gap:10px;
        align-items:center;
    }

    .inline-reply-btn {
        flex:1;
        border:none;
        background:linear-gradient(135deg, var(--primary), var(--secondary));
        color:white;
        cursor:pointer;
        font-size:18px;
        font-weight:bold;
        border-radius:12px;
        padding:14px 16px;
    }

    .cancel-reply-inline {
        border:none;
        background:#eee;
        color:#444;
        cursor:pointer;
        font-size:18px;
        padding:0 16px;
        border-radius:12px;
        min-width:52px;
    }

    /* Input area */
    .chat-input-area {
        padding:10px;
        background:white;
        border-top:1px solid var(--border);
        display:flex;
        align-items:center;
    }

    .chat-input-area input[type="text"] {
        flex:1;
        padding:10px 15px;
        border:none;
        background:var(--bg);
        border-radius:20px;
        font-size:15px;
        outline:none;
    }

    .chat-input-area button, .chat-input-area label {
        background:none;
        border:none;
        color:var(--primary);
        font-size:22px;
        margin:0 5px;
        cursor:pointer;
    }

    .chat-input-area input[type="file"] { display:none; }

    .img-preview-container {
        position:relative;
        margin-right:10px;
        display:none;
    }

    .img-preview {
        width:50px;
        height:50px;
        object-fit:cover;
        border-radius:5px;
    }

    .remove-img {
        position:absolute;
        top:-5px;
        right:-5px;
        background:red;
        color:white;
        border-radius:50%;
        width:18px;
        height:18px;
        text-align:center;
        line-height:18px;
        font-size:10px;
        cursor:pointer;
    }

    /* Lists */
    .list-header {
        padding:15px;
        background:white;
        border-bottom:1px solid var(--border);
        display:flex;
        align-items:center;
    }

    .search-box {
        width:100%;
        padding:10px 15px;
        border:none;
        background:var(--bg);
        border-radius:20px;
        font-size:14px;
        outline:none;
    }

    .list-item {
        display:flex;
        align-items:center;
        padding:12px 15px;
        background:white;
        border-bottom:1px solid var(--border);
    }

    .list-item:hover { background:var(--bg); }

    .avatar {
        width:50px;
        height:50px;
        border-radius:50%;
        position:relative;
        margin-right:15px;
        flex-shrink:0;
        background:linear-gradient(135deg, var(--primary), var(--secondary));
        color:white;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:24px;
        overflow:hidden;
    }

    .avatar img {
        width:100%;
        height:100%;
        border-radius:50%;
        object-fit:cover;
    }

    .online-dot {
        position:absolute;
        bottom:2px;
        right:2px;
        width:12px;
        height:12px;
        border-radius:50%;
        border:2px solid white;
    }

    .online { background:var(--online); }
    .offline { background:var(--offline); }

    .list-item-info { flex:1; }

    .list-item-name {
        font-weight:bold;
        font-size:16px;
        display:flex;
        align-items:center;
        gap:8px;
    }

    .unread-chat-badge {
        background:var(--primary);
        color:white;
        border-radius:10px;
        padding:2px 8px;
        font-size:12px;
        margin-left:5px;
    }

    .list-item-action {
        background:linear-gradient(135deg, var(--primary), var(--secondary));
        color:white;
        border:none;
        padding:8px 12px;
        border-radius:5px;
        cursor:pointer;
        font-size:12px;
    }

    .list-item-action.delete {
        background:#dc3545;
        margin-left:5px;
    }

    .load-more-btn {
        width:100%;
        padding:10px;
        background:white;
        border:none;
        color:var(--primary);
        font-weight:bold;
        cursor:pointer;
        border-bottom:1px solid var(--border);
    }

    .blocked-icon {
        cursor:pointer;
        margin-left:10px;
        font-size:20px;
    }

    /* Profile */
    .profile-container {
        padding:20px;
        background:white;
        margin:20px;
        border-radius:10px;
    }

    .profile-avatar {
        width:100px;
        height:100px;
        border-radius:50%;
        margin-bottom:15px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:50px;
        background:#eee;
        cursor:pointer;
        overflow:hidden;
    }

    .profile-avatar img {
        width:100%;
        height:100%;
        border-radius:50%;
        object-fit:cover;
    }

    .emoji-grid {
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        margin:15px 0;
    }

    .emoji-option {
        font-size:30px;
        cursor:pointer;
        border:2px solid transparent;
        border-radius:50%;
        width:50px;
        height:50px;
        display:flex;
        align-items:center;
        justify-content:center;
    }

    .emoji-option.selected {
        border-color:var(--primary);
        background:var(--bg);
    }

    .profile-form input[type="text"], .profile-form input[type="file"] {
        width:100%;
        padding:10px;
        margin-bottom:15px;
        border-radius:5px;
        border:1px solid var(--border);
        font-size:16px;
    }

    .profile-form button {
        width:100%;
        padding:10px;
        background:linear-gradient(135deg, var(--primary), var(--secondary));
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
        font-size:16px;
    }

    .profile-actions {
        display:flex;
        align-items:center;
        gap:10px;
        margin-top:12px;
    }

    .profile-actions .message-profile-btn {
        flex:1;
        padding:10px;
        border:none;
        border-radius:8px;
        background:linear-gradient(135deg, var(--primary), var(--secondary));
        color:white;
        font-size:15px;
        font-weight:bold;
        cursor:pointer;
    }

    /* Fullscreen */
    .fullscreen-modal {
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.9);
        z-index:100;
        display:none;
        align-items:center;
        justify-content:center;
    }

    .fullscreen-modal img {
        max-width:90%;
        max-height:90%;
    }

    .fullscreen-modal .close-btn {
        position:absolute;
        top:20px;
        right:20px;
        color:white;
        font-size:30px;
        cursor:pointer;
    }
</style>

</head>
<body>
<div id="app-container">
    <div id="auth-screen" class="auth-screen">
        <div class="auth-brand">CHATGURU</div>
        <div class="auth-sub">Messagerie simple et rapide.</div>
        <div class="auth-form">
            <div id="auth-error" class="auth-error hidden"></div>        <div id="auth-main">
            <input type="text" id="auth-username" placeholder="Nom d'utilisateur" class="hidden">
            <input type="email" id="auth-email" placeholder="Email">
            <div class="password-field">
                <input type="password" id="auth-password" placeholder="Mot de passe">
                <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
            </div>
            <button onclick="handleAuth()" id="auth-btn">Connexion</button>
            <div class="auth-toggle" onclick="switchAuthMode()">Créer un compte</div>
            <div class="forgot-password" onclick="showForgotPwd()">Mot de passe oublié ?</div>
        </div>

        <div id="auth-forgot" class="hidden">
            <div id="forgot-step-email">
                <label>Votre email</label>
                <input type="email" id="forgot-email" placeholder="Email">
                <button onclick="sendResetCode()">Envoyer le code</button>
                <div class="auth-toggle" onclick="hideForgotPwd()">Retour</div>
            </div>
            <div id="forgot-step-code" class="hidden">
                <label>Code reçu</label>
                <input type="text" id="forgot-code" placeholder="Code">
                <button onclick="verifyResetCode()">Vérifier</button>
            </div>
            <div id="forgot-step-new-pwd" class="hidden">
                <label>Nouveau mot de passe</label>
                <input type="password" id="forgot-new-pwd" placeholder="Mot de passe">
                <button onclick="resetPassword()">Valider</button>
            </div>
            <div id="forgot-message" style="color:green; margin-top:10px;"></div>
        </div>
    </div>
</div>

<div id="main-app" class="main-app">
    <div class="header">
        <i class="fas fa-bars menu-btn" onclick="toggleSidebar()"></i>
        <i class="fas fa-arrow-left back-btn" onclick="goBack()"></i>
        <div class="title" id="header-title">CHATGURU</div>
        <div class="unread-badge" id="unread-badge" style="display:none;">
            <i class="fas fa-envelope"></i>
            <span class="count" id="unread-count">0</span>
        </div>
        <i class="fas fa-sync-alt refresh-btn" onclick="refreshView()"></i>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header" id="sidebar-username"></div>
        <div class="sidebar-menu">
            <div class="sidebar-item" onclick="nav('global')"><i class="fas fa-globe"></i> CHATGURU</div>
            <div class="sidebar-item" onclick="nav('find-users')"><i class="fas fa-search"></i> Utilisateurs</div>
            <div class="sidebar-item" onclick="nav('my-chats')"><i class="fas fa-comments"></i> Mes Chats</div>
            <div class="sidebar-item" onclick="nav('profile')"><i class="fas fa-user-circle"></i> Mon Profil</div>
            <div class="sidebar-item logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</div>
        </div>
    </div>

    <div id="view-global" class="content-area active">
        <div class="message-list" id="global-messages"></div>
        <div class="chat-input-area">
            <div class="img-preview-container" id="global-img-preview">
                <img src="" class="img-preview" id="global-preview-img">
                <div class="remove-img" onclick="removeImage('global')">×</div>
            </div>
            <label for="global-file-input"><i class="fas fa-image"></i></label>
            <input type="file" id="global-file-input" accept="image/*" onchange="previewImage(this,'global')">
            <input type="text" id="global-text-input" placeholder="Écrire..." onkeypress="handleKey(event,'global')">
            <button onclick="send('global')"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="view-find-users" class="content-area">
        <div class="list-header"><input type="text" class="search-box" placeholder="Rechercher..." oninput="search()"></div>
        <div id="users-list"></div>
        <button class="load-more-btn hidden" id="load-more-users" onclick="moreUsers()">Charger plus</button>
    </div>

    <div id="view-my-chats" class="content-area">
        <div class="list-header">
            <h3 style="flex:1;">Mes Conversations</h3>
            <span class="blocked-icon" onclick="nav('blocked-users')" title="Utilisateurs bloqués">🚧</span>
        </div>
        <div id="chats-list"></div>
        <button class="load-more-btn hidden" id="load-more-chats" onclick="moreChats()">Charger plus</button>
    </div>

    <div id="view-private-chat" class="content-area">
        <div style="display:flex;align-items:center;padding:10px;background:white;border-bottom:1px solid var(--border);position:relative;">
            <div style="flex:1;font-weight:bold;" id="private-chat-partner-name"></div>
            <i class="fas fa-cog" style="cursor:pointer;margin-right:10px;" onclick="togglePrivateMenu()"></i>
            <div id="private-chat-menu" style="display:none;position:absolute;right:10px;top:50px;background:white;border:1px solid #ccc;border-radius:5px;z-index:50;padding:5px;">
                <div style="padding:8px 12px;cursor:pointer;" id="block-option" onclick="blockUser()">Bloquer</div>
            </div>
        </div>
        <div class="message-list" id="private-messages"></div>
        <div class="chat-input-area">
            <div class="img-preview-container" id="private-img-preview">
                <img src="" class="img-preview" id="private-preview-img">
                <div class="remove-img" onclick="removeImage('private')">×</div>
            </div>
            <label for="private-file-input"><i class="fas fa-image"></i></label>
            <input type="file" id="private-file-input" accept="image/*" onchange="previewImage(this,'private')">
            <input type="text" id="private-text-input" placeholder="Écrire..." onkeypress="handleKey(event,'private')">
            <button onclick="send('private')"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="view-profile" class="content-area">
        <div class="profile-container">
            <h3>Mon Profil</h3>
            <div id="profile-avatar" class="profile-avatar" onclick="viewFullImage(currentUser?.avatar_url)"></div>
            <div id="profile-name" style="font-size:18px;font-weight:bold;margin-bottom:20px;"></div>
            <div class="profile-form">
                <label>Nouveau nom</label>
                <input type="text" id="profile-new-username">
                <label>Image</label>
                <input type="file" id="profile-avatar-file" accept="image/*">
                <p>Emojis :</p>
                <div class="emoji-grid" id="emoji-grid"></div>
                <button onclick="updateProfile()">Enregistrer</button>
            </div>
        </div>
    </div>

    <div id="view-user-profile" class="content-area">
        <div class="profile-container">
            <div id="user-profile-avatar" class="profile-avatar" onclick="viewFullImage(currentViewedUser?.avatar_url)"></div>
            <div id="user-profile-name" style="font-size:18px;font-weight:bold;"></div>
            <div class="profile-actions">
                <button class="message-profile-btn" onclick="startChatFromProfile()">
                    <i class="fas fa-comment"></i> Message
                </button>
            </div>
        </div>
    </div>

    <div id="view-blocked-users" class="content-area">
        <div class="list-header"><h3>Utilisateurs bloqués</h3></div>

    </div>
</div>

<div class="fullscreen-modal" id="fullscreen-modal" onclick="closeFullscreen()">
    <span class="close-btn">&times;</span>
    <img id="fullscreen-img" src="">
</div>

</div><script>
    const API = "https://web-production-6d656.up.railway.app/";

    let currentUser = null;
    let socket = null;
    let isRegister = false;
    let currentView = 'global';
    let privateChatId = null;
    let privatePartnerId = null;
    let privatePartnerName = '';
    let userSearchPage = 1;
    let userSearchQuery = '';
    let chatsPage = 1;
    let blockedPage = 1;
    let uploadFiles = { global:null, private:null };
    let currentViewedUser = null;
    let resetToken = null;

    function renderAvatar(url, cls) {
        const d = document.createElement('div');
        d.className = cls || 'avatar-small';

        const emoji = /^[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/u.test(url || '');
        if (emoji) {
            d.textContent = url;
            d.style.background = '#e0e0e0';
        } else if (url) {
            const i = document.createElement('img');
            i.src = API + (url.startsWith('/') ? url : '/' + url);
            d.appendChild(i);
        } else {
            d.textContent = '👤';
        }
        return d;
    }

    // AUTH
    function switchAuthMode() {
        isRegister = !isRegister;
        document.getElementById('auth-username').classList.toggle('hidden', !isRegister);
        document.getElementById('auth-btn').textContent = isRegister ? "S'inscrire" : "Connexion";
        document.querySelector('.auth-toggle').textContent = isRegister ? "J'ai déjà un compte" : "Créer un compte";
        document.getElementById('auth-error').classList.add('hidden');
    }

    function togglePassword() {
        const p = document.getElementById('auth-password');
        const i = document.querySelector('.toggle-password');
        p.type = p.type === 'password' ? 'text' : 'password';
        i.classList.toggle('fa-eye');
        i.classList.toggle('fa-eye-slash');
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const username = document.getElementById('auth-username').value;
        const err = document.getElementById('auth-error');
        let endpoint = '/login';
        let body = { email, password };

        if (isRegister) {
            if (!username) {
                err.textContent = "Nom requis";
                err.classList.remove('hidden');
                return;
            }
            endpoint = '/register';
            body.username = username;
        }

        try {
            const r = await fetch(API + endpoint, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify(body)
            });
            const d = await r.json();
            if (!r.ok) throw new Error(d.message || 'Erreur');

            currentUser = { id:d.id, username:d.username, email:d.email, is_admin:d.is_admin, avatar_url:d.avatar_url };
            localStorage.setItem('user', JSON.stringify(currentUser));
            initApp();
        } catch(e) {
            err.textContent = e.message;
            err.classList.remove('hidden');
        }
    }

    function showForgotPwd() {
        document.getElementById('auth-main').classList.add('hidden');
        document.getElementById('auth-forgot').classList.remove('hidden');
        resetForgotSteps();
    }

    function hideForgotPwd() {
        document.getElementById('auth-forgot').classList.add('hidden');
        document.getElementById('auth-main').classList.remove('hidden');
    }

    function resetForgotSteps() {
        document.getElementById('forgot-step-email').classList.remove('hidden');
        document.getElementById('forgot-step-code').classList.add('hidden');
        document.getElementById('forgot-step-new-pwd').classList.add('hidden');
        document.getElementById('forgot-message').textContent = '';
    }

    async function sendResetCode() {
        const e = document.getElementById('forgot-email').value;
        const r = await fetch(API + '/auth/forgot_password', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email:e })
        });
        const d = await r.json();
        document.getElementById('forgot-message').textContent = d.message || '';
        document.getElementById('forgot-step-email').classList.add('hidden');
        document.getElementById('forgot-step-code').classList.remove('hidden');
    }

    async function verifyResetCode() {
        const e = document.getElementById('forgot-email').value;
        const c = document.getElementById('forgot-code').value;
        const r = await fetch(API + '/auth/verify_code', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email:e, code:c })
        });
        const d = await r.json();
        if (d.reset_token) {
            resetToken = d.reset_token;
            document.getElementById('forgot-step-code').classList.add('hidden');
            document.getElementById('forgot-step-new-pwd').classList.remove('hidden');
        } else {
            document.getElementById('forgot-message').textContent = d.message || 'Erreur';
        }
    }

    async function resetPassword() {
        const p = document.getElementById('forgot-new-pwd').value;
        const r = await fetch(API + '/auth/reset_password', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ reset_token:resetToken, new_password:p })
        });
        const d = await r.json();
        document.getElementById('forgot-message').textContent = d.message || '';
        if (r.ok) setTimeout(hideForgotPwd, 2000);
    }

    // APP
    function initApp() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.add('active');
        document.getElementById('sidebar-username').textContent = currentUser.username;
        connectSocket();
        nav('global');
        updateUnreadBadge();
    }

    function logout() {
        if (socket) socket.disconnect();
        localStorage.removeItem('user');
        location.reload();
    }

    // SOCKET
    function connectSocket() {
        socket = io(API, { query:{ user_id:currentUser.id } });

        socket.on('receive_global_message', m => appendMessage('global-messages', m));
        socket.on('receive_private_message', m => {
            if (m.chat_id === privateChatId) appendMessage('private-messages', m);
            updateUnreadBadge();
        });

        socket.on('private_chat_started', data => {
            privateChatId = data.chat_id;
            privatePartnerId = data.target_id;
            joinRoom(data.chat_id);
            loadMessages('private', data.chat_id);
            nav('private-chat');
            document.getElementById('private-chat-partner-name').textContent = privatePartnerName;
        });

        socket.on('user_status', d => {
            document.querySelectorAll(`.online-dot[data-userid="${d.user_id}"]`).forEach(el => {
                el.className = 'online-dot ' + (d.is_online ? 'online' : 'offline');
            });
        });

        socket.on('update_unread_count', d => {
            if (d.user_id === currentUser.id) updateUnreadBadge(d.total_unread);
        });

        socket.on('messages_read', d => {
            if (privateChatId === d.chat_id && currentUser.id === d.partner_id) {
                loadMessages('private', privateChatId);
            }
        });

        socket.on('error', d => alert(d.message || 'Erreur'));
    }

    function joinRoom(id) {
        socket.emit('join_room', { chat_id:id });
    }

    function leaveRoom(id) {
        socket.emit('leave_room', { chat_id:id });
    }

    // NAV
    function toggleSidebar() {
        document.getElementById('sidebar').classList.add('active');
        document.getElementById('sidebar-overlay').style.display = 'block';
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('sidebar-overlay').style.display = 'none';
    }

    function nav(view) {
        closeSidebar();
        currentView = view;
        document.querySelectorAll('.content-area').forEach(e => e.classList.remove('active'));
        const target = document.getElementById('view-' + view);
        if (target) target.classList.add('active');

        document.querySelector('.menu-btn').style.display = (view === 'private-chat' || view === 'user-profile') ? 'none' : 'block';
        document.querySelector('.back-btn').style.display = (view === 'private-chat' || view === 'user-profile' || view === 'blocked-users') ? 'block' : 'none';

        if (view === 'global') {
            document.getElementById('header-title').textContent = 'CHATGURU';
            loadMessages('global');
        } else if (view === 'find-users') {
            document.getElementById('header-title').textContent = 'Utilisateurs';
            userSearchPage = 1;
            loadUsers();
        } else if (view === 'my-chats') {
            document.getElementById('header-title').textContent = 'Mes Chats';
            chatsPage = 1;
            loadChats();
        } else if (view === 'private-chat') {
            document.getElementById('header-title').textContent = privatePartnerName || 'Chat privé';
        } else if (view === 'profile') {
            document.getElementById('header-title').textContent = 'Mon Profil';
            loadProfile();
        } else if (view === 'user-profile') {
            document.getElementById('header-title').textContent = currentViewedUser?.username || 'Profil';
        } else if (view === 'blocked-users') {
            document.getElementById('header-title').textContent = 'Bloqués';
            blockedPage = 1;
            loadBlocked();
        }
    }

    function goBack() {
        if (currentView === 'private-chat') nav('my-chats');
        else if (currentView === 'user-profile') nav('find-users');
        else if (currentView === 'blocked-users') nav('my-chats');
    }

    function refreshView() {
        if (currentView === 'global') loadMessages('global');
        else if (currentView === 'find-users') { userSearchPage = 1; loadUsers(); }
        else if (currentView === 'my-chats') { chatsPage = 1; loadChats(); updateUnreadBadge(); }
        else if (currentView === 'private-chat') loadMessages('private', privateChatId);
        else if (currentView === 'profile') loadProfile();
        else if (currentView === 'blocked-users') { blockedPage = 1; loadBlocked(); }
    }

    // MESSAGES
    async function loadMessages(type, chatId = null) {
        let url = API + '/messages?type=' + type;
        if (type === 'private') {
            if (!chatId) return;
            url += '&chat_id=' + encodeURIComponent(chatId) + '&user_id=' + encodeURIComponent(currentUser.id);
        }

        const r = await fetch(url);
        const d = await r.json();
        const cont = document.getElementById(type === 'global' ? 'global-messages' : 'private-messages');
        cont.innerHTML = '';
        (d.messages || []).forEach(m => appendMessage(cont.id, m, false));
        cont.scrollTop = cont.scrollHeight;

        if (type === 'private' && chatId) {
            socket.emit('mark_messages_read', { chat_id: chatId });
        }
        updateUnreadBadge();
    }

    function appendMessage(containerId, msg, scroll = true) {
        const cont = document.getElementById(containerId);
        const isMe = msg.username === currentUser.username;

        const row = document.createElement('div');
        row.className = 'message-row ' + (isMe ? 'me' : 'other');
        row.dataset.messageId = msg.id;

        const av = renderAvatar(msg.avatar_url, 'avatar-small');

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';

        let html = '';
        if (msg.reply_to) {
            html += `<div class="reply-preview"><i class="fas fa-reply"></i> <b>${msg.reply_to.username}</b>: ${msg.reply_to.content || 'Image'}</div>`;
        }
        if (msg.image_url) {
            html += `<img src="${API}${msg.image_url}" class="message-image" onclick="viewFullImage('${msg.image_url}')">`;
        }
        if (msg.content) {
            html += `<span>${msg.content}</span>`;
        }
        bubble.innerHTML = html;

        const info = document.createElement('div');
        info.className = 'message-info';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'clickable-name' + (msg.is_admin ? ' admin-name' : '');
        nameSpan.textContent = msg.username;
        nameSpan.onclick = () => { if (msg.user_id) viewUserProfile(msg.user_id); };
        info.appendChild(nameSpan);

        if (msg.is_admin) {
            const adm = document.createElement('span');
            adm.style.cssText = 'color:var(--admin);font-size:10px;margin-left:2px;';
            adm.textContent = 'ADMIN';
            info.appendChild(adm);
        }

        const timeSpan = document.createElement('span');
        timeSpan.style.fontSize = '10px';
        timeSpan.textContent = new Date(msg.timestamp).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
        info.appendChild(timeSpan);

        if (containerId === 'private-messages' && isMe && msg.read) {
            const vu = document.createElement('span');
            vu.className = 'vu-badge';
            vu.textContent = 'VU';
            info.appendChild(vu);
        }

        const replyIcon = document.createElement('i');
        replyIcon.className = 'fas fa-reply reply-icon';
        replyIcon.title = 'Répondre';

        const scope = (containerId === 'global-messages') ? 'global' : 'private';
        replyIcon.onclick = () => showInlineReply(row, scope, msg);
        info.appendChild(replyIcon);

        contentDiv.appendChild(bubble);
        contentDiv.appendChild(info);
        row.appendChild(av);
        row.appendChild(contentDiv);
        cont.appendChild(row);

        if (scroll) cont.scrollTop = cont.scrollHeight;
    }

    function showInlineReply(row, scope, msg) {
        document.querySelectorAll('.inline-reply-form').forEach(f => f.remove());

        const form = document.createElement('div');
        form.className = 'inline-reply-form';

        form.innerHTML = `
            <div class="inline-reply-top">
                <div class="reply-mention">Répondre à @${msg.username}</div>
                <textarea class="reply-input" id="inline-reply-input-${scope}" placeholder="Votre réponse..."></textarea>        </div>
        <div class="inline-reply-actions">
            <button class="inline-reply-btn" onclick="sendInlineReply('${scope}','${msg.id}')">Reply</button>
            <button class="cancel-reply-inline" onclick="this.closest('.inline-reply-form').remove()" title="Annuler"><i class="fas fa-times"></i></button>
        </div>
    `;

    row.appendChild(form);
    document.getElementById('inline-reply-input-' + scope).focus();
}

async function sendInlineReply(scope, replyToId) {
    const input = document.getElementById('inline-reply-input-' + scope);
    if (!input) return;

    const content = input.value.trim();
    if (!content) return;

    if (scope === 'global') {
        socket.emit('send_global_message', {
            content: content,
            image_url: '',
            reply_to: replyToId
        });
    } else {
        if (!privateChatId) {
            alert('Chat privé introuvable.');
            return;
        }
        socket.emit('send_private_message', {
            chat_id: privateChatId,
            content: content,
            image_url: '',
            reply_to: replyToId
        });
    }

    const form = input.closest('.inline-reply-form');
    if (form) form.remove();
}

function viewFullImage(url) {
    if (!url) return;
    document.getElementById('fullscreen-img').src = API + (url.startsWith('/') ? url : '/' + url);
    document.getElementById('fullscreen-modal').style.display = 'flex';
}

function closeFullscreen() {
    document.getElementById('fullscreen-modal').style.display = 'none';
}

async function send(type) {
    const input = document.getElementById(type + '-text-input');
    const content = input.value.trim();
    const file = uploadFiles[type];
    if (!content && !file) return;

    let imgUrl = '';
    if (file) {
        const fd = new FormData();
        fd.append('file', file);
        const r = await fetch(API + '/upload', { method:'POST', body:fd });
        const d = await r.json();
        if (!r.ok) { alert(d.message || 'Upload impossible'); return; }
        imgUrl = d.image_url;
    }

    const payload = { content, image_url: imgUrl };
    if (type === 'global') {
        socket.emit('send_global_message', payload);
    } else {
        if (!privateChatId) {
            alert('Chat privé introuvable.');
            return;
        }
        socket.emit('send_private_message', { ...payload, chat_id: privateChatId });
    }

    input.value = '';
    removeImage(type);
}

function handleKey(e, type) {
    if (e.key === 'Enter') send(type);
}

function previewImage(input, type) {
    if (input.files[0]?.size > 5 * 1024 * 1024) { alert('Max 5Mo'); return; }
    uploadFiles[type] = input.files[0];
    const reader = new FileReader();
    reader.onload = e => {
        document.getElementById(type + '-preview-img').src = e.target.result;
        document.getElementById(type + '-img-preview').style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
}

function removeImage(type) {
    uploadFiles[type] = null;
    document.getElementById(type + '-file-input').value = '';
    document.getElementById(type + '-img-preview').style.display = 'none';
}

// USERS
async function loadUsers() {
    const r = await fetch(API + '/users?page=' + userSearchPage + '&search=' + encodeURIComponent(userSearchQuery));
    const d = await r.json();
    const list = document.getElementById('users-list');
    if (userSearchPage === 1) list.innerHTML = '';

    (d.users || []).forEach(u => {
        const item = document.createElement('div');
        item.className = 'list-item';

        const av = renderAvatar(u.avatar_url, 'avatar');
        const dot = document.createElement('div');
        dot.className = 'online-dot ' + (u.is_online ? 'online' : 'offline');
        dot.dataset.userid = u.id;
        av.appendChild(dot);

        const info = document.createElement('div');
        info.className = 'list-item-info';
        info.innerHTML = `<div class="list-item-name clickable-name" onclick="viewUserProfile('${u.id}')">${u.username}</div>`;

        item.appendChild(av);
        item.appendChild(info);

        if (u.id !== currentUser.id) {
            const btn = document.createElement('button');
            btn.className = 'list-item-action';
            btn.textContent = 'Message';
            btn.onclick = () => startChat(u.id, u.username);
            item.appendChild(btn);
        }

        list.appendChild(item);
    });

    document.getElementById('load-more-users').classList.toggle('hidden', (d.users || []).length < 50);
}

function search() {
    userSearchQuery = document.querySelector('.search-box').value;
    userSearchPage = 1;
    loadUsers();
}

function moreUsers() {
    userSearchPage++;
    loadUsers();
}

// CHATS
async function loadChats() {
    const r = await fetch(API + '/chats?user_id=' + encodeURIComponent(currentUser.id) + '&page=' + chatsPage);
    const d = await r.json();
    const list = document.getElementById('chats-list');
    if (chatsPage === 1) list.innerHTML = '';

    (d.chats || []).forEach(c => {
        const item = document.createElement('div');
        item.className = 'list-item';

        const av = renderAvatar(c.partner.avatar_url, 'avatar');
        const dot = document.createElement('div');
        dot.className = 'online-dot ' + (c.partner.is_online ? 'online' : 'offline');
        av.appendChild(dot);

        const info = document.createElement('div');
        info.className = 'list-item-info';
        info.innerHTML = `<div class="list-item-name clickable-name" onclick="openChat('${c.chat_id}','${c.partner.username}','${c.partner.id}')">${c.partner.username} ${c.unread_count ? `<span class="unread-chat-badge">${c.unread_count}</span>` : ''}</div>`;

        const del = document.createElement('button');

    document.getElementById('load-more-chats').classList.toggle('hidden', (d.chats || []).length < 50);

function moreChats() {
    chatsPage++;
    loadChats();
}

async function deleteChat(id) {
    if (confirm('Supprimer ?')) {
        await fetch(API + '/chats/' + encodeURIComponent(id) + '?user_id=' + encodeURIComponent(currentUser.id), { method:'DELETE' });
        chatsPage = 1;
        loadChats();
        updateUnreadBadge();
    }
}

function startChat(targetId, targetName) {
    privatePartnerName = targetName;
    privatePartnerId = targetId;
    socket.emit('start_private_chat', { target_id: targetId });
}

function openChat(chatId, partnerName, partnerId) {
    privateChatId = chatId;
    privatePartnerName = partnerName;
    privatePartnerId = partnerId;
    loadMessages('private', chatId);
    nav('private-chat');
    document.getElementById('private-chat-partner-name').textContent = partnerName;
}

// BLOCK
function togglePrivateMenu() {
    const menu = document.getElementById('private-chat-menu');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    if (currentUser && privatePartnerId) {
        fetch(API + '/profile?user_id=' + privatePartnerId)
            .then(r => r.json())
            .then(p => {
                document.getElementById('block-option').style.display = (p.email === 'tenshyxa@gmail.com') ? 'none' : 'block';
            });

}

async function blockUser() {
    if (!privatePartnerId) return;
    if (confirm('Bloquer cet utilisateur ?')) {
        await fetch(API + '/block', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ blocker_id:currentUser.id, blocked_id:privatePartnerId })
        });

        document.getElementById('private-chat-menu').style.display = 'none';

}

// BLOCKED USERS
async function loadBlocked() {
    const r = await fetch(API + '/blocked_users?user_id=' + encodeURIComponent(currentUser.id) + '&page=' + blockedPage);
    const d = await r.json();
    const list = document.getElementById('blocked-list');
    if (blockedPage === 1) list.innerHTML = '';

    (d.blocked_users || []).forEach(u => {
        const item = document.createElement('div');

        const av = renderAvatar(u.avatar_url, 'avatar');

        info.className = 'list-item-info';
        info.innerHTML = `<span class="list-item-name">${u.username}</span>`;

        const btn = document.createElement('button');
        btn.className = 'list-item-action';
        btn.textContent = 'Débloquer';
        btn.onclick = async () => {

function moreBlocked() {

}

// PROFILE
async function loadProfile() {
    const r = await fetch(API + '/profile?user_id=' + encodeURIComponent(currentUser.id));
    const u = await r.json();

    document.getElementById('profile-name').textContent = u.username;
    document.getElementById('profile-new-username').value = u.username;

    const avDiv = document.getElementById('profile-avatar');
    avDiv.innerHTML = '';
    avDiv.style.background = '#eee';

    const isEmoji = /^[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/u.test(u.avatar_url || '');
    if (isEmoji) {
        avDiv.textContent = u.avatar_url;
        avDiv.style.background = '#e0e0e0';
    } else {
        const img = document.createElement('img');
        img.src = API + u.avatar_url;
        avDiv.appendChild(img);
    }

    const er = await fetch(API + '/default_emojis');
    const emojis = await er.json();
    const grid = document.getElementById('emoji-grid');
    grid.innerHTML = '';
    let selected = u.avatar_url && isEmoji ? u.avatar_url : null;

    (emojis.emojis || []).forEach(e => {
        const span = document.createElement('span');
        span.className = 'emoji-option';
        span.textContent = e;
        if (e === selected) span.classList.add('selected');
        span.onclick = () => {
            document.querySelectorAll('.emoji-option').forEach(s => s.classList.remove('selected'));
            span.classList.add('selected');
            window._selectedEmoji = e;
        };
        grid.appendChild(span);
    });

    window._selectedEmoji = selected;
}

async function updateProfile() {
    const username = document.getElementById('profile-new-username').value.trim();
    const file = document.getElementById('profile-avatar-file').files[0];
    const emoji = window._selectedEmoji;

    if (emoji) {
        const r = await fetch(API + '/profile', {
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ user_id:currentUser.id, username, avatar_emoji:emoji })
        });
        const u = await r.json();
        if (!r.ok) alert(u.message || 'Erreur');
        else {
            updateCurrentUser(u);
            loadProfile();
            alert('Profil mis à jour');
        }
        return;
    }

    const fd = new FormData();
    fd.append('user_id', currentUser.id);
    if (username) fd.append('username', username);
    if (file) fd.append('avatar', file);

    const r = await fetch(API + '/profile', { method:'PUT', body:fd });
    const u = await r.json();
    if (!r.ok) alert(u.message || 'Erreur');
    else {
        updateCurrentUser(u);
        loadProfile();
        alert('Profil mis à jour');
    }
}

function updateCurrentUser(u) {
    currentUser.username = u.username;
    currentUser.avatar_url = u.avatar_url;
    localStorage.setItem('user', JSON.stringify(currentUser));
    document.getElementById('sidebar-username').textContent = u.username;
}

// VIEW OTHER USER
async function viewUserProfile(id) {
    const r = await fetch(API + '/profile?user_id=' + encodeURIComponent(id));
    currentViewedUser = await r.json();

    document.getElementById('user-profile-name').textContent = currentViewedUser.username;

    const av = document.getElementById('user-profile-avatar');
    av.innerHTML = '';
    av.style.background = '#eee';

    const isEmoji = /^[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/u.test(currentViewedUser.avatar_url || '');
    if (isEmoji) {
        av.textContent = currentViewedUser.avatar_url;
        av.style.background = '#e0e0e0';
    } else {
        const img = document.createElement('img');
        img.src = API + currentViewedUser.avatar_url;
        av.appendChild(img);
    }

    nav('user-profile');
}

function startChatFromProfile() {
    if (currentViewedUser) startChat(currentViewedUser.id, currentViewedUser.username);
}

// UNREAD
async function updateUnreadBadge(total) {
    if (total === undefined) {
        try {
            const r = await fetch(API + '/unread_count?user_id=' + encodeURIComponent(currentUser.id));
            const d = await r.json();
            total = d.total_unread;
        } catch(e) {
            return;
        }
    }
    const badge = document.getElementById('unread-badge');
    document.getElementById('unread-count').textContent = total;
    badge.style.display = total > 0 ? 'inline-flex' : 'none';
}

document.addEventListener('click', e => {
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.querySelector('.menu-btn');
    if (sidebar.classList.contains('active') && !sidebar.contains(e.target) && e.target !== menuBtn && !menuBtn.contains(e.target)) {
        closeSidebar();
    }
});

window.onload = () => {
    const saved = localStorage.getItem('user');
    if (saved) {
        currentUser = JSON.parse(saved);
        initApp();
    }
};

</script>
